<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Baustellenabwicklung</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@500;700&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

:root{
  --paper:#F3F1EC;
  --surface:#FFFFFF;
  --ink:#20262B;
  --muted:#6E7670;
  --accent:#D9531E;
  --navy:#16323F;
  --line:#E2DED4;
}

*{ box-sizing:border-box; }
body{
  margin:0;
  background:var(--paper);
  font-family:'IBM Plex Sans', sans-serif;
  color:var(--ink);
  padding:28px 22px 36px;
}

.head{
  max-width:1040px;
  margin:0 auto 22px;
  display:flex;
  align-items:baseline;
  justify-content:space-between;
  gap:16px;
  border-bottom:1px solid var(--line);
  padding-bottom:14px;
}
.head h1{
  font-family:'JetBrains Mono', monospace;
  font-size:15px;
  letter-spacing:.12em;
  text-transform:uppercase;
  margin:0;
  color:var(--navy);
  font-weight:700;
}
.head p{
  margin:0;
  font-size:12.5px;
  color:var(--muted);
}

.grid{
  max-width:1040px;
  margin:0 auto;
  display:grid;
  grid-template-columns:repeat(5, 1fr);
  gap:18px;
}

.tile{
  position:relative;
  background:var(--surface);
  border:1px solid var(--line);
  border-radius:14px;
  padding:0;
  aspect-ratio:182/232;
  overflow:hidden;
  cursor:pointer;
  font:inherit;
  text-align:left;
  -webkit-tap-highlight-color:transparent;
  transition:border-color .25s ease, box-shadow .25s ease, transform .25s ease;
}
.tile:hover, .tile:focus-visible{
  border-color:var(--navy);
  box-shadow:0 10px 24px -10px rgba(20,40,50,.35);
  transform:translateY(-2px);
  outline:none;
}

.tile img{
  width:100%;
  height:100%;
  object-fit:contain;
  padding:14px;
  display:block;
  transition:opacity .25s ease, filter .25s ease;
}
.tile:hover img, .tile:focus-visible img{
  opacity:.18;
  filter:blur(1px) grayscale(.3);
}

.badge{
  position:absolute;
  top:10px;
  left:10px;
  font-family:'JetBrains Mono', monospace;
  font-size:10px;
  letter-spacing:.06em;
  color:var(--muted);
  background:var(--paper);
  border:1px solid var(--line);
  padding:2px 6px;
  border-radius:4px;
  transition:opacity .2s ease;
}
.tile:hover .badge, .tile:focus-visible .badge{ opacity:0; }

.panel{
  position:absolute;
  inset:0;
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  gap:6px;
  padding:16px 14px;
  background:linear-gradient(180deg, rgba(22,50,63,0) 0%, rgba(22,50,63,.06) 28%, var(--navy) 70%);
  color:#fff;
  opacity:0;
  transform:translateY(10px);
  transition:opacity .28s ease, transform .28s ease;
  pointer-events:none;
}
.tile:hover .panel, .tile:focus-visible .panel{
  opacity:1;
  transform:translateY(0);
}

.panel-eyebrow{
  font-family:'JetBrains Mono', monospace;
  font-size:10px;
  letter-spacing:.1em;
  color:var(--accent);
  text-transform:uppercase;
}
.panel-title{
  font-size:15px;
  font-weight:600;
  line-height:1.15;
}
.panel-text{
  font-size:11.5px;
  line-height:1.4;
  color:#D7DEE1;
}

@media (max-width:880px){
  .grid{ grid-template-columns:repeat(3, 1fr); }
}
@media (max-width:560px){
  .grid{ grid-template-columns:repeat(2, 1fr); gap:12px; }
  .head{ flex-direction:column; align-items:flex-start; gap:4px; }
}

@media (prefers-reduced-motion: reduce){
  .tile, .tile img, .panel{ transition:none; }
}
</style>
</head>
